name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Format check
        run: cargo fmt --all -- --check

  host:
    name: host checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev
      - name: Host build check
        run: cargo check --locked -p imu-core -p imu-validation -p imu-tool --all-targets --all-features
      - name: no_std core check
        run: cargo check --locked -p imu-core --no-default-features
      - name: Host tests
        run: cargo test --locked -p imu-core -p imu-validation -p imu-tool --all-features
      - name: Host clippy
        run: cargo clippy --locked -p imu-core -p imu-validation -p imu-tool --all-targets --all-features -- -D warnings
      - name: Fixture smoke tests
        run: |
          cargo run --locked -p imu-tool -- analyze tools/imu-tool/tests/fixtures/stationary-60s.log --min-samples 20
          cargo run --locked -p imu-tool -- orientation-analyze tools/imu-tool/tests/fixtures/auto-orientation.log --min-samples-per-axis 3
          cargo run --locked -p imu-tool -- sixface-analyze tools/imu-tool/tests/fixtures/sixface.log --mapping config/sixface-mapping.example.json || test $? -eq 1

  embedded:
    name: esp32-c3 firmware checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Embedded build check
        run: cargo check --locked -p mpu6050-esp32c3-bringup --target riscv32imc-unknown-none-elf
      - name: Embedded core no_std check
        run: cargo check --locked -p imu-core --no-default-features --target riscv32imc-unknown-none-elf
