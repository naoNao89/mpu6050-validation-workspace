name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Format check
        run: cargo fmt --all -- --check

  host:
    name: host checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev
      - name: Host build check
        run: cargo check --locked -p imu-core -p imu-validation -p imu-tool -p mpu6050-driver --all-targets --all-features
      - name: no_std core check
        run: cargo check --locked -p imu-core --no-default-features
      - name: Driver tests
        run: cargo test --locked -p mpu6050-driver
      - name: Host tests
        run: cargo test --locked -p imu-core -p imu-validation -p imu-tool -p mpu6050-driver --all-features
      - name: Host clippy
        run: cargo clippy --locked -p imu-core -p imu-validation -p imu-tool -p mpu6050-driver --all-targets --all-features -- -D warnings
      - name: Fixture smoke tests
        run: |
          cargo run --locked -p imu-tool -- analyze tools/imu-tool/tests/fixtures/stationary-60s.log --min-samples 20
          cargo run --locked -p imu-tool -- orientation-analyze tools/imu-tool/tests/fixtures/auto-orientation.log --min-samples-per-axis 3
          cargo run --locked -p imu-tool -- sixface-analyze tools/imu-tool/tests/fixtures/sixface.log --mapping config/sixface-mapping.example.json || test $? -eq 1

  embedded:
    name: firmware size budget CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: ESP32-C3 firmware check
        run: cargo check --locked -p mpu6050-esp32c3-bringup --target riscv32imc-unknown-none-elf
      - name: imu-core no_std RISC-V check
        run: cargo check --locked -p imu-core --no-default-features --target riscv32imc-unknown-none-elf
      - name: Install cargo-binutils
        run: cargo install cargo-binutils
      - name: ESP32-C3 release firmware build
        run: env -u RUSTFLAGS cargo build --locked -p mpu6050-esp32c3-bringup --release --target riscv32imc-unknown-none-elf
      - name: Firmware size budget profiles
        run: |
          for profile in esp32-c3-ci esp32-c3 esp32-c6 esp32-h2 esp32-p4 esp32-s3; do
            echo "::group::firmware size budget (${profile})"
            FIRMWARE_BUDGET_PROFILE="${profile}" scripts/check-firmware-budget.sh target/riscv32imc-unknown-none-elf/release/mpu6050-esp32c3-bringup
            echo "::endgroup::"
          done
      - name: ESP32-C3 largest firmware symbols
        run: rust-nm --size-sort --print-size target/riscv32imc-unknown-none-elf/release/mpu6050-esp32c3-bringup | tail -50
