name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      external-board-check:
        description: "Run ESP32-C3 external consumer firmware checks"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Format check
        run: cargo fmt --all -- --check

  host:
    name: host checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev
      - name: Host build check
        run: cargo check --locked -p imu-tool -p mpu6050-driver --all-targets --all-features
      - name: Driver tests
        run: cargo test --locked -p mpu6050-driver
      - name: Driver package dry run
        run: cargo publish -p mpu6050-driver --dry-run --locked
      - name: Driver docs
        if: runner.os == 'Linux'
        run: cargo doc --locked -p mpu6050-driver --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Host tests
        run: cargo test --locked -p imu-tool -p mpu6050-driver --all-features
      - name: Host clippy
        run: cargo clippy --locked -p imu-tool -p mpu6050-driver --all-targets --all-features -- -D warnings
      - name: P4 host unit tests
        run: cargo test --locked --manifest-path boards/esp32-p4/Cargo.toml --config 'patch.crates-io.mpu6050-driver.path="crates/mpu6050-driver"'
      - name: Fixture smoke tests
        run: |
          cargo run --locked -p imu-tool -- analyze tools/imu-tool/tests/fixtures/stationary-60s.log --min-samples 20
          cargo run --locked -p imu-tool -- orientation-analyze tools/imu-tool/tests/fixtures/auto-orientation.log --min-samples-per-axis 3
          cargo run --locked -p imu-tool -- sixface-analyze tools/imu-tool/tests/fixtures/sixface.log --mapping config/sixface-mapping.example.json || test $? -eq 1

  p4-firmware:
    name: ESP32-P4 firmware checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: riscv32imafc-unknown-none-elf
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: ESP32-P4 firmware check
        run: make check-firmware-p4

  embedded:
    name: firmware size budget CI
    if: github.event_name == 'workflow_dispatch' && inputs.external-board-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: ESP32-C3 firmware check
        run: CARGO_TARGET_DIR=target cargo --config 'patch.crates-io.mpu6050-driver.path="crates/mpu6050-driver"' check --locked --manifest-path boards/esp32-c3/Cargo.toml --target riscv32imc-unknown-none-elf
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: riscv32imafc-unknown-none-elf
      - name: ESP32-P4 firmware check
        run: make check-firmware-p4
      - name: Install cargo-binutils
        run: cargo install cargo-binutils
      - name: ESP32-C3 release firmware build
        run: env -u RUSTFLAGS CARGO_TARGET_DIR=target cargo --config 'patch.crates-io.mpu6050-driver.path="crates/mpu6050-driver"' build --locked --manifest-path boards/esp32-c3/Cargo.toml --release --target riscv32imc-unknown-none-elf
      - name: Firmware size budget profiles
        run: |
          for profile in esp32-c3-ci esp32-c3 esp32-c6 esp32-h2 esp32-p4 esp32-s3; do
            echo "::group::firmware size budget (${profile})"
            FIRMWARE_BUDGET_PROFILE="${profile}" scripts/check-firmware-budget.sh target/riscv32imc-unknown-none-elf/release/mpu6050-esp32c3-bringup
            echo "::endgroup::"
          done
      - name: ESP32-C3 largest firmware symbols
        run: rust-nm --size-sort --print-size target/riscv32imc-unknown-none-elf/release/mpu6050-esp32c3-bringup | tail -50
