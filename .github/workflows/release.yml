name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  host-cli:
    name: host CLI artifact (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: imu-tool-linux-x86_64
            binary: target/release/imu-tool
          - os: macos-latest
            artifact: imu-tool-macos-arm64
            binary: target/release/imu-tool
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev
      - name: Build imu-tool
        run: cargo build --locked -p imu-tool --release
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  esp32c3-firmware:
    name: ESP32-C3 firmware artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Build firmware
        run: cargo build --locked -p mpu6050-esp32c3-bringup --release --target riscv32imc-unknown-none-elf
      - uses: actions/upload-artifact@v4
        with:
          name: mpu6050-esp32c3-bringup-elf
          path: target/riscv32imc-unknown-none-elf/release/mpu6050-esp32c3-bringup
